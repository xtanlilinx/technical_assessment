services:
  # (2e) ASR Service
  asr-api:
    build:
      context: .
      dockerfile: asr/Dockerfile
    container_name: asr-api
    ports:
      - "8001:8001"
    volumes:
      - hf_models:/root/.cache
    environment:
      - HF_HOME=/root/.cache
      - MODEL_ID=facebook/wav2vec2-large-960h
    restart: unless-stopped

  # (4c) Elasticsearch Node 1 (Master Node)
  es-node01:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: es-node01
    ports:
      - "9200:9200"
    environment:
      - node.name=es-node01
      - cluster.name=asr-cluster
      - node.master=true          
      - discovery.seed_hosts=es-node02
      - cluster.initial_master_nodes=es-node01
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin=*
      - http.cors.allow-methods=OPTIONS, HEAD, GET, POST, PUT, DELETE
      - http.cors.allow-headers=Content-Type, Content-Length, Authorization, X-Requested-With, x-elastic-client-meta
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data01:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health?local=true | grep -vq '\"status\":\"red\"' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s 

  # (4c) Elasticsearch Node 2 (Data Node Only)
  es-node02:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: es-node02
    environment:
      - node.name=es-node02
      - cluster.name=asr-cluster
      - node.master=false
      - discovery.seed_hosts=es-node01
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin=*
      - http.cors.allow-methods=OPTIONS, HEAD, GET, POST, PUT, DELETE
      - http.cors.allow-headers=Content-Type, Content-Length, Authorization, X-Requested-With, x-elastic-client-meta
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data02:/usr/share/elasticsearch/data    
    restart: unless-stopped

  # (4d) Elastic Backend
  elastic-backend:
    build:
      context: .
      dockerfile: elastic-backend/Dockerfile
    container_name: elastic-backend
    depends_on:
      es-node01:
        condition: service_healthy
      es-node02:
        condition: service_started
    environment:
      - ES_HOST=http://es-node01:9200,http://es-node02:9200
    volumes:
      - ./common_voice:/app/common_voice
    restart: no

  # (5b) Search UI Frontend                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             
  search-ui:
    build:
      context: .
      dockerfile: search-ui/Dockerfile
    container_name: search-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REACT_APP_SEARCH_ENDPOINT=http://13.250.112.203:9200 
    depends_on:
      - es-node01
      - es-node02
    restart: unless-stopped

volumes:
  hf_models: 
  es-data01:
  es-data02: